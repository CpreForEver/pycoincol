<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Coin - PyCoinCol</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="page-layout">
    <div class="container">
        <header>
            <a href="{{ url_for('coins_bp.coins') }}" class="back-link">&larr; Back to Collection</a>
            <h1>Edit Coin</h1>
        </header>
        
        <main>
            {% if coin %}
            <div class="form-container">
                <form action="{{ url_for('index_bp.edit_coin', id=coin.id) }}" method="POST" class="coin-form">
                    <input type="hidden" name="id" value="{{ coin.id }}">
                    
                    <div class="form-group">
                        <label for="pcgs_no">PCGS No</label>
                        <input type="text" id="pcgs_no" name="pcgs_no" value="{{ coin.pcgs_no or '' }}">
                    </div>
                    <div class="form-group">
                        <label for="cert_no">Cert No</label>
                        <input type="text" id="cert_no" name="cert_no" value="{{ coin.cert_no or '' }}">
                    </div>
                    <div class="form-group">
                        <label for="name">Coin Name *</label>
                        <input type="text" id="name" name="name" required value="{{ coin.name or '' }}" autofocus>
                    </div>
                    <div class="form-group">
                        <label for="denomination">Denomination</label>
                        <input type="text" id="denomination" name="denomination" value="{{ coin.denomination or '' }}">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="year">Year</label>
                            <input type="number" id="year" name="year" value="{{ coin.year or '' }}" min="1000" max="2100">
                        </div>
                        
                        <div class="form-group">
                            <label for="mint">Mint</label>
                            <input type="text" id="mint" name="mint" value="{{ coin.mint or '' }}">
                        </div>
                        
                        <div class="form-group">
                            <label for="mint_mark">Mint Mark</label>
                            <input type="text" id="mint_mark" name="mint_mark" value="{{ coin.mint_mark or '' }}">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="mint_location">Mint Location</label>
                            <input type="text" id="mint_location" name="mint_location" value="{{ coin.mint_location or '' }}">
                        </div>
                        <div class="form-group">
                            <label for="metal_content">Metal Content</label>
                            <input type="text" id="metal_content" name="metal_content" value="{{ coin.metal_content or '' }}">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="diameter">Diameter (mm)</label>
                            <input type="number" id="diameter" name="diameter" step="0.01" value="{{ coin.diameter or '' }}">
                        </div>
                        <div class="form-group">
                            <label for="edge">Edge</label>
                            <input type="text" id="edge" name="edge" value="{{ coin.edge or '' }}">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="weight">Weight (g)</label>
                            <input type="number" id="weight" name="weight" step="0.01" value="{{ coin.weight or '' }}">
                        </div>
                        <div class="form-group">
                            <label for="country">Country</label>
                            <input type="text" id="country" name="country" value="{{ coin.country or '' }}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="grade">Grade</label>
                        <input type="text" id="grade" name="grade" value="{{ coin.grade or '' }}">
                    </div>
                    <div class="form-group">
                        <label for="designation">Designation</label>
                        <input type="text" id="designation" name="designation" value="{{ coin.designation or '' }}">
                    </div>
                    <div class="form-group">
                        <label for="price_guide_value">Price Guide Value ($)</label>
                        <input type="number" id="price_guide_value" name="price_guide_value" step="0.01" min="0" value="{{ coin.price_guide_value or '' }}">
                    </div>
                    <div class="form-group">
                        <label for="population">Population</label>
                        <input type="number" id="population" name="population" min="0" value="{{ coin.population or '' }}">
                    </div>
                    <div class="form-group">
                        <label for="pop_higher">Pop Higher</label>
                        <input type="number" id="pop_higher" name="pop_higher" min="0" value="{{ coin.pop_higher or '' }}">
                    </div>
                    <div class="form-group">
                        <label for="coin_facts_link">CoinFacts Link</label>
                        <input type="url" id="coin_facts_link" name="coin_facts_link" value="{{ coin.coin_facts_link or '' }}">
                    </div>
                    <div class="form-group">
                        <label for="designer">Designer</label>
                        <input type="text" id="designer" name="designer" value="{{ coin.designer or '' }}">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="thumbnail_url">Thumbnail</label>
                            <input type="url" id="thumbnail_url" name="thumbnail_url" value="{{ coin.thumbnail_url or '' }}">
                        </div>
                        <div class="form-group">
                            <label for="fullsize_url">Fullsize</label>
                            <input type="url" id="fullsize_url" name="fullsize_url" value="{{ coin.fullsize_url or '' }}">
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Update Coin</button>
                        <a href="{{ url_for('coins_bp.coins') }}" class="btn">Cancel</a>
                    </div>
                </form>
            </div>
            {% else %}
            <div class="empty-state">
                <h2>Coin Not Found</h2>
                <p>Sorry, the coin you're looking for doesn't exist or has already been deleted.</p>
                <a href="{{ url_for('coins_bp.coins') }}" class="btn btn-primary">Back to Collection</a>
            </div>
            {% endif %}
        </main>
        
        <footer>
            <p>PyCoinCol &copy; 2026</p>
        </footer>
    </div>
</body>
</html>
